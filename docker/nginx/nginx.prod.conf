# ─────────────────────────────────────────────────────────────────────────────
# SJMS 2.5 — Production Nginx Configuration
# Dual-mode TLS: Let's Encrypt (certbot webroot) or Institutional CA certs
#
# Certificate paths (configurable via docker-compose volume mounts):
#   /etc/nginx/certs/fullchain.pem   — certificate chain
#   /etc/nginx/certs/privkey.pem     — private key
#
# These paths work identically for both Let's Encrypt and institutional CA
# certificates — only the source of the files differs.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Hide nginx version from response headers
    server_tokens off;

    # ── Logging ──────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ── Rate Limiting ────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;

    # ── Upstream Definitions ─────────────────────────────────────────────
    upstream api_upstream {
        server api:3001;
    }
    upstream client_upstream {
        server client:80;
    }
    upstream keycloak_upstream {
        server keycloak:8080;
    }
    upstream n8n_upstream {
        server n8n:5678;
    }
    upstream minio_upstream {
        server minio:9000;
    }

    # ════════════════════════════════════════════════════════════════════
    # HTTP Server — ACME challenge only, everything else → HTTPS
    # ════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME HTTP-01 challenge
        # Webroot: /var/www/certbot (shared volume with certbot container)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Health check endpoint (used by load balancers / Docker health checks)
        # Available over HTTP so upstream health probes work before TLS is configured
        location = /health {
            proxy_pass http://api_upstream/api/health;
            proxy_set_header Host $host;
        }

        # All other traffic → HTTPS redirect
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ════════════════════════════════════════════════════════════════════
    # HTTPS Server — TLS termination, reverse proxy, security headers
    # ════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name _;

        # ── TLS Configuration ────────────────────────────────────────────
        # These paths are volume-mounted. Source can be:
        #   (a) Let's Encrypt via certbot → /etc/letsencrypt/live/<domain>/
        #   (b) Institutional CA          → manually placed files
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Modern TLS settings (Mozilla Intermediate profile)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;

        # Session resumption
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling (works with Let's Encrypt; institutional CAs may vary)
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ── Security Headers ─────────────────────────────────────────────
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Content-Security-Policy for React SPA + embedded Swagger UI at /api/docs.
        # 'self' is the only default; 'unsafe-inline' is required for shadcn/ui
        # runtime styles and Swagger UI's inline CSS. 'unsafe-eval' is only
        # needed by Swagger UI for its JSON schema highlighter — scope it to
        # /api/docs via a narrower rule in that location block when it matters.
        # connect-src must include the API host and the Keycloak /auth origin
        # both served from the same nginx upstream.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'" always;

        # ── API ──────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ── Prometheus Metrics — internal network only ───────────────────
        location = /metrics {
            # Allow Docker internal networks and private ranges
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;
            proxy_pass http://api_upstream/metrics;
            proxy_set_header Host $host;
        }

        # ── Keycloak — user-facing auth endpoints ────────────────────────
        location /auth/ {
            limit_req zone=auth burst=20 nodelay;

            proxy_pass http://keycloak_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # ── Keycloak Admin Console — restricted access ───────────────────
        # CIDR allowlist controlled by NGINX_ADMIN_CIDR env var or defaults.
        # Block public access to the Keycloak administration console.
        location /auth/admin/ {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;

            proxy_pass http://keycloak_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # ── n8n Workflow Engine — internal network only ──────────────────
        # n8n webhook paths (/webhook/*) are proxied for workflow triggers,
        # but the n8n admin UI is restricted to private networks.
        location /n8n/ {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;

            proxy_pass http://n8n_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # n8n webhook endpoints — accessible publicly (workflows need to
        # receive events from the API server and potentially external sources)
        location /webhook/ {
            proxy_pass http://n8n_upstream/webhook/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── MinIO — internal network only ────────────────────────────────
        location /minio/ {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;

            proxy_pass http://minio_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Client SPA (default) ────────────────────────────────────────
        location / {
            proxy_pass http://client_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}

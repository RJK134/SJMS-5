name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      description: Please confirm before submitting.
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I am using the latest release or have reproduced this on the `main` branch.
          required: true
        - label: I have read the contributing guidelines.
          required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide clear, numbered steps to reproduce the bug.
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Provide details about your environment.
      placeholder: |
        - OS: macOS 14.x / Ubuntu 22.04 / Windows 11
        - Runtime version: Node 20.x / Python 3.12 / etc.
        - Package version: x.y.z
        - Browser (if relevant): Chrome 124
      render: markdown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: |
        Paste relevant log output or attach screenshots. Logs are automatically formatted.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that may be relevant (related issues, links, etc.).
    validations:
      required: false

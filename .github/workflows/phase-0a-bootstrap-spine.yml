name: Phase 0A — Bootstrap SJMS-2.5 spine

# One-shot bootstrap workflow that clones SJMS-2.5 main into SJMS-5
# as `phase-0/spine-import`. This sidesteps the limitation that the
# GitHub MCP push_files API cannot practically push 976 files / 62 MB
# in a single session.
#
# Triggered manually by the operator. Excludes the bulky
# reference-only files and the SJMS-5 planning docs already on main.
# Subsequent Phase 0 batches (0B rebrand, 0C MinIO+AES, 0D BullMQ,
# 0E k6, 0F JWT, 0G MFA, 0H n8n header, 0I CI, 0J closeout, 0K
# governance, 0L outbox, 0M supply-chain, 0N Dependabot+BugBot)
# are then driven by Claude via normal push_files calls.
#
# Per operating-model §6 STOP-gates and the Phase 0 batch 0A scope,
# this workflow does NOT rebrand any source file. Rebranding is a
# separate, reviewable Claude commit (batch 0A2) so the diff is
# surgical.
#
# WARNING: this workflow is intended to be run ONCE for the initial
# bootstrap. Re-running it after Phase 0 batches 0A2–0N have been
# committed to `phase-0/spine-import` will force-push over those
# commits. Only re-trigger if the initial bootstrap failed and the
# remote `phase-0/spine-import` branch has been deleted.
#
# SECURITY NOTES:
# - The user-controlled `source_ref` input is routed through an env: block
#   on every step that needs it, never via $GITHUB_ENV. This prevents the
#   CRLF / env-var-injection attack class (CodeQL actions/envvar-injection)
#   where a newline-containing input could inject LD_PRELOAD / BASH_ENV /
#   NODE_OPTIONS into subsequent steps.
# - Values computed at runtime (e.g. SJMS25_SHA from git rev-parse) that
#   must cross step boundaries are written to $GITHUB_ENV using the
#   multi-line delimiter syntax for the same reason. Even though
#   `git rev-parse HEAD` always returns a single hex line in practice,
#   relying on data-cleanliness is fragile defence; the delimiter syntax
#   eliminates the surface regardless.
# - The bootstrap commit message is built via `printf '%s\n' ...` rather
#   than a multi-line `git commit -m "..."` string. Multi-line bare strings
#   inside YAML `run: |` block scalars require every continuation line to
#   be indented to the block's content level (10 spaces); a single missed
#   continuation indent invalidates the whole workflow file. The printf
#   pattern uses one quoted arg per line, which is naturally YAML-safe.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type CONFIRM to proceed (force-rewrites phase-0/spine-import)'
        required: true
        type: string
      source_ref:
        description: 'SJMS-2.5 ref to bootstrap from (default: main)'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write

jobs:
  bootstrap:
    name: Clone SJMS-2.5 → phase-0/spine-import
    runs-on: ubuntu-latest
    if: ${{ inputs.confirm == 'CONFIRM' }}

    steps:
      - name: Refuse if confirm input missing
        if: ${{ inputs.confirm != 'CONFIRM' }}
        run: |
          echo "::error::Workflow refused: confirm input must be exactly 'CONFIRM'."
          exit 1

      - name: Checkout SJMS-5 main
        uses: actions/checkout@v4
        with:
          path: sjms-5
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone SJMS-2.5 (public, no auth)
        env:
          # Indirection via env var prevents script injection in the run
          # block below. GitHub interpolates ${{ inputs.source_ref }} into
          # SOURCE_REF safely; the shell then reads it as a quoted variable
          # rather than parsing it as command text.
          SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          git clone --depth 1 --branch "$SOURCE_REF" \
            https://github.com/RJK134/SJMS-2.5.git sjms-25
          SJMS25_SHA=$(cd sjms-25 && git rev-parse HEAD)
          {
            echo "SJMS25_SHA<<EOF_SJMS25_SHA_DELIMITER"
            echo "$SJMS25_SHA"
            echo "EOF_SJMS25_SHA_DELIMITER"
          } >> "$GITHUB_ENV"
          {
            echo "SJMS-2.5 HEAD: $SJMS25_SHA"
            echo ""
            echo "Source ref: $SOURCE_REF"
          } >> "$GITHUB_STEP_SUMMARY"
          rm -rf sjms-25/.git

      - name: Configure git
        run: |
          cd sjms-5
          git config user.name 'sjms-5-bootstrap-bot'
          git config user.email 'sjms-5-bootstrap-bot@users.noreply.github.com'

      - name: Create phase-0/spine-import branch from main
        run: |
          cd sjms-5
          git checkout -B phase-0/spine-import

      - name: Sync SJMS-2.5 contents (excluding bulky reference and existing SJMS-5 docs)
        run: |
          cd sjms-5
          rsync -av \
            --exclude='.git/' \
            --exclude='.claude/worktrees/' \
            --exclude='.claude/*.txt' \
            --exclude='node_modules/' \
            --exclude='docs/Complete Perplexity How to Build A SJMS.pdf' \
            --exclude='docs/*_files/' \
            --exclude='docs/SJMS-5-SYNTHESIS-PLAN.md' \
            --exclude='docs/SJMS-5-BUILD-QUEUE.md' \
            --exclude='docs/SJMS-5-OPERATING-MODEL.md' \
            --exclude='docs/SJMS-5-KNOWN-ISSUES.md' \
            --exclude='docs/SJMS-5-PLAN-AMENDMENTS-2026-05-16.md' \
            --exclude='docs/skills-leads/' \
            --exclude='/README.md' \
            ../sjms-25/ ./
          {
            echo ""
            echo "### File counts after sync"
            echo ""
            echo "- Total tracked files: $(git ls-files | wc -l)"
            echo "- New files staged: $(git status --short | wc -l)"
            echo "- Prisma schema lines: $(wc -l < prisma/schema.prisma 2>/dev/null || echo 'n/a')"
            echo "- API routers: $(ls -d server/src/api/*/ 2>/dev/null | wc -l)"
            echo "- Test files: $(find server/src/__tests__ -name '*.test.ts' 2>/dev/null | wc -l)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stage and commit
        env:
          SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          cd sjms-5
          git add -A
          STAGED=$(git diff --cached --name-only | wc -l)
          if [ "$STAGED" -eq 0 ]; then
            echo "::error::Nothing staged. The local branch matches main HEAD."
            echo "::error::This indicates either (a) the spine is already imported, or"
            echo "::error::(b) batches 0A2-0N already exist on remote phase-0/spine-import."
            echo "::error::Refusing to push to avoid overwriting later batch work."
            echo "::error::To legitimately re-bootstrap, delete the remote phase-0/spine-import branch first."
            exit 1
          fi
          # Build the commit message via printf with one quoted arg per line.
          # This pattern is YAML-safe: every line is naturally indented at the
          # block's content level, unlike a multi-line `git commit -m "..."`
          # bare string which requires careful continuation indentation that
          # is easy to lose on edit.
          printf '%s\n' \
            "chore(phase-0): bootstrap SJMS-2.5 spine into phase-0/spine-import" \
            "" \
            "Batch 0A1 of Phase 0 — mechanical spine import via GitHub Action." \
            "" \
            "Source: RJK134/SJMS-2.5@${SOURCE_REF} (commit ${SJMS25_SHA})" \
            "" \
            "Excluded from import:" \
            "- .git/ (source repo metadata)" \
            "- .claude/worktrees/, .claude/*.txt (KI-S5-316 hygiene)" \
            "- node_modules/ (not in repo anyway, defensive)" \
            "- docs/Complete Perplexity How to Build A SJMS.pdf (30 MB reference)" \
            "- docs/*_files/ (HTML export download artefacts)" \
            "- All SJMS-5 planning docs already on main (preserved as-is)" \
            "- docs/skills-leads/ (preserved as-is)" \
            "- /README.md at transfer root (preserved on main; rebranded in 0A2)." \
            "  Deeper README.md files (server/, client/, etc.) are imported." \
            "" \
            "No source files rebranded in this commit. Rebrand follows in batch" \
            "0A2 as a separate, reviewable Claude-driven diff (package.json," \
            "CLAUDE.md, docker-compose.yml, container names, repo URL" \
            "references, Vercel project name, docs:check expected counts)." \
            "" \
            "Next batches per docs/SJMS-5-BUILD-QUEUE.md Phase 0:" \
            "0B import 2.5 18B+18C finance work" \
            "0C MinIO + AES-256-GCM + cryptobox (extends secrets-at-rest)" \
            "0D BullMQ + Redis worker pattern" \
            "0E k6 scenarios" \
            "0F remove static-secret JWT fallback" \
            "0G enforce MFA in Keycloak realm" \
            "0H correct n8n header to x-internal-service-key" \
            "0I CI green (typecheck + Prisma + tests + advisory lint + CodeQL + npm audit + k6)" \
            "0J Phase 0 closeout (KI register, BugBot, evidence pack)" \
            "0K governance (branch protection + LICENSE + CODEOWNERS + repo description)" \
            "0L transactional outbox + worker (load-bearing)" \
            "0M supply-chain hardening (pin :latest, SBOM, Trivy, Checkov)" \
            "0N Dependabot alerts enforcement + BugBot/CodeRabbit wiring" \
            > /tmp/sjms5-phase-0a-commit-msg.txt
          git commit -F /tmp/sjms5-phase-0a-commit-msg.txt
          {
            echo ""
            echo "### Commit"
            echo ""
            echo '```'
            git log --oneline -1
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Push to phase-0/spine-import
        run: |
          cd sjms-5
          git push origin phase-0/spine-import --force-with-lease
          {
            echo ""
            echo "### Next steps"
            echo ""
            echo "1. The Phase 0 PR will auto-update with the bootstrap commit."
            echo "2. Claude will pick up from batch 0A2 (rebrand) and proceed through 0B–0N."
            echo "3. **Do not push directly to phase-0/spine-import outside of Claude/CI** — the branch is the canonical Phase 0 work area."
            echo "4. **Do not re-run this workflow** unless the remote phase-0/spine-import branch has been deleted first."
          } >> "$GITHUB_STEP_SUMMARY"

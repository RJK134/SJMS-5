name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs-truth:
    name: Docs truth check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Mandatory: catches drift between documented counts (models, routers,
    # roles, workflows) and the actual repository state. The script under
    # scripts/check-docs-truth.mjs is the single source of truth.
    #
    # Also runs the post-1C undeclared-imports guardrail
    # (`scripts/check-undeclared-imports.mjs`) which scans server/src,
    # client/src, and scripts/ for bare `import 'pkg'` statements whose
    # `pkg` is not declared in any workspace package.json. Catches the
    # class of regression Phase 1C surfaced — PR #74 silently removed
    # `bullmq` from `server/package.json` even though `queue.ts` still
    # imported it, and the hoisted node_modules masked the issue
    # locally; CI's `npm ci` blew up on the next PR that triggered a
    # fresh install. The check runs in the docs-truth job (no install
    # required) so it is a fast, mandatory gate on every PR.
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Run docs truth check
        run: node scripts/check-docs-truth.mjs
      - name: Check for undeclared imports
        run: node scripts/check-undeclared-imports.mjs

  server-quality:
    name: Server quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Detect server-affecting changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            server:
              - 'server/**'
              - 'prisma/**'
              - 'scripts/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'

      - if: steps.filter.outputs.server == 'true' || github.event_name == 'push'
        uses: actions/checkout@v6

      - if: steps.filter.outputs.server == 'true' || github.event_name == 'push'
        name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      # Restore the Prisma engine-binary cache BEFORE `npm ci`: the
      # `@prisma/engines` package's postinstall hook runs during the
      # workspace install and downloads platform-specific query-engine
      # binaries to `~/.cache/prisma/<channel>/<sha>/<platform>/`. With
      # the cache restored first, postinstall finds the binaries on
      # disk and skips the CDN fetch; placing this step after `npm ci`
      # would defeat the cache because the install would already have
      # gone to the network. The exact-match key is bound to the
      # schema content, the Prisma version in the lockfile, and the
      # runner OS, so a real drift in any of those produces a fresh
      # exact-key cache. `restore-keys` is a best-effort fallback: on
      # an exact-key miss, any prior `prisma-engines-<os>-*` cache is
      # restored as a starting point, postinstall fetches only the
      # binaries the new Prisma version actually needs, and the cache
      # is rewritten under the new exact key at job end.
      - if: steps.filter.outputs.server == 'true' || github.event_name == 'push'
        name: Cache Prisma engines
        uses: actions/cache@v5
        with:
          path: ~/.cache/prisma
          key: prisma-engines-${{ runner.os }}-${{ hashFiles('package-lock.json', 'prisma/schema.prisma') }}
          restore-keys: |
            prisma-engines-${{ runner.os }}-

      - if: steps.filter.outputs.server == 'true' || github.event_name == 'push'
        name: Install workspace dependencies
        run: npm ci --no-audit --no-fund

      - if: steps.filter.outputs.server == 'true' || github.event_name == 'push'
        name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - if: steps.filter.outputs.server == 'true' || github.event_name == 'push'
        name: Validate Prisma schema
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          # DIRECT_URL is referenced by the schema's `directUrl` property
          # (the Neon-on-Vercel canonical pattern). Mirror DATABASE_URL in
          # CI because we have no PGBouncer; only Vercel needs a distinct
          # unpooled URL. See docs/VERCEL-RUNBOOK.md §4.2.
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci
        run: npx prisma validate --schema=prisma/schema.prisma

      - if: steps.filter.outputs.server == 'true' || github.event_name == 'push'
        name: TypeScript check (server)
        working-directory: server
        run: npx tsc --noEmit

      - if: steps.filter.outputs.server == 'true' || github.event_name == 'push'
        name: Unit tests with coverage (server)
        working-directory: server
        # Coverage thresholds are owned by server/vitest.config.ts so
        # local runs match CI exactly. Do not add CLI overrides here.
        run: npx vitest run --config vitest.config.ts --coverage --reporter=default

      - if: steps.filter.outputs.server == 'true' || github.event_name == 'push'
        name: Build server (tsc emit)
        # `tsc --noEmit` above only checks types. The emit build catches
        # a separate class of failure (declaration-emit errors, output
        # path collisions, isolated-modules violations) that the noEmit
        # pass cannot see. Production-grade gate must verify both.
        working-directory: server
        run: npm run build

      - name: Upload server build artefact
        if: always() && (steps.filter.outputs.server == 'true' || github.event_name == 'push')
        uses: actions/upload-artifact@v7
        with:
          name: server-dist
          path: server/dist
          if-no-files-found: warn
          retention-days: 7

      - name: Publish server coverage summary
        if: always() && (steps.filter.outputs.server == 'true' || github.event_name == 'push')
        run: |
          set -u
          SUMMARY_PATH=server/coverage/coverage-summary.json
          if [ ! -s "$SUMMARY_PATH" ]; then
            {
              echo '## Server coverage'
              echo ''
              echo "> Coverage summary not found at \`$SUMMARY_PATH\`."
              echo '> The unit-test step above is the authoritative gate; this is reporting-only.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          const path = 'server/coverage/coverage-summary.json';
          try {
            const summary = JSON.parse(fs.readFileSync(path, 'utf8'));
            const total = summary.total ?? {};
            const pct = (m) => (m && typeof m.pct === 'number') ? `${m.pct}%` : 'n/a';
            console.log('## Server coverage');
            console.log('');
            console.log('| Metric | Coverage |');
            console.log('| --- | ---: |');
            console.log(`| Lines | ${pct(total.lines)} |`);
            console.log(`| Statements | ${pct(total.statements)} |`);
            console.log(`| Functions | ${pct(total.functions)} |`);
            console.log(`| Branches | ${pct(total.branches)} |`);
          } catch (err) {
            console.log('## Server coverage');
            console.log('');
            console.log('> Coverage summary could not be parsed: ' + err.message);
            console.log('> The unit-test step above is the authoritative gate; this is reporting-only.');
          }
          NODE

      - name: Upload server coverage artefact
        if: always() && (steps.filter.outputs.server == 'true' || github.event_name == 'push')
        uses: actions/upload-artifact@v7
        with:
          name: server-coverage
          path: server/coverage
          if-no-files-found: warn

  client-quality:
    name: Client quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Detect client-affecting changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            client:
              - 'client/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'

      - if: steps.filter.outputs.client == 'true' || github.event_name == 'push'
        uses: actions/checkout@v6

      - if: steps.filter.outputs.client == 'true' || github.event_name == 'push'
        name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      # See server-quality for the rationale; the same cache must be
      # restored before `npm ci` so the `@prisma/engines` postinstall
      # finds the binaries on disk instead of going to the CDN.
      - if: steps.filter.outputs.client == 'true' || github.event_name == 'push'
        name: Cache Prisma engines
        uses: actions/cache@v5
        with:
          path: ~/.cache/prisma
          key: prisma-engines-${{ runner.os }}-${{ hashFiles('package-lock.json', 'prisma/schema.prisma') }}
          restore-keys: |
            prisma-engines-${{ runner.os }}-

      - if: steps.filter.outputs.client == 'true' || github.event_name == 'push'
        name: Install workspace dependencies
        run: npm ci --no-audit --no-fund

      - if: steps.filter.outputs.client == 'true' || github.event_name == 'push'
        name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - if: steps.filter.outputs.client == 'true' || github.event_name == 'push'
        name: TypeScript check (client)
        working-directory: client
        run: npx tsc --noEmit

      - if: steps.filter.outputs.client == 'true' || github.event_name == 'push'
        name: Build client (vite production build)
        # `tsc --noEmit` above only verifies types. `npm run build` runs
        # `tsc -b && vite build`, which is the closest thing CI can do
        # to the real production output: it triggers JSX/transform
        # validation, asset resolution, env-var inlining, and bundle
        # generation. A green typecheck does not guarantee a green
        # bundle, so this is a separate gate.
        working-directory: client
        run: npm run build

      - name: Upload client build artefact
        if: always() && (steps.filter.outputs.client == 'true' || github.event_name == 'push')
        uses: actions/upload-artifact@v7
        with:
          name: client-dist
          path: client/dist
          if-no-files-found: warn
          retention-days: 7

  lint-advisory:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Advisory while the KI-P14-001 ESLint bootstrap is bedding in. The
    # server and client typecheck jobs above remain the authoritative
    # PR gates. A follow-on KI tracks the work to ratchet this gate to
    # blocking once the baseline is triaged.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      # Restore the Prisma engine cache before `npm ci` — see
      # server-quality for the full rationale.
      - name: Cache Prisma engines
        uses: actions/cache@v5
        with:
          path: ~/.cache/prisma
          key: prisma-engines-${{ runner.os }}-${{ hashFiles('package-lock.json', 'prisma/schema.prisma') }}
          restore-keys: |
            prisma-engines-${{ runner.os }}-

      - name: Install workspace dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Lint server (advisory)
        working-directory: server
        continue-on-error: true
        run: |
          set -u
          mkdir -p ../.lint-reports
          npx eslint src --format json --output-file ../.lint-reports/server.json || true
          npx eslint src --format stylish || true

      - name: Lint client (advisory)
        working-directory: client
        continue-on-error: true
        run: |
          set -u
          mkdir -p ../.lint-reports
          npx eslint src --format json --output-file ../.lint-reports/client.json || true
          npx eslint src --format stylish || true

      - name: Publish lint summary
        if: always()
        run: |
          set -u
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          const path = require('path');
          const targets = [
            { name: 'Server', file: '.lint-reports/server.json' },
            { name: 'Client', file: '.lint-reports/client.json' },
          ];
          console.log('## Lint (advisory)');
          console.log('');
          console.log('| Workspace | Files scanned | Errors | Warnings |');
          console.log('| --- | ---: | ---: | ---: |');
          for (const t of targets) {
            try {
              if (!fs.existsSync(t.file)) {
                console.log(`| ${t.name} | _report missing_ | n/a | n/a |`);
                continue;
              }
              const raw = fs.readFileSync(t.file, 'utf8').trim();
              if (!raw) {
                console.log(`| ${t.name} | _empty report_ | n/a | n/a |`);
                continue;
              }
              const data = JSON.parse(raw);
              const files = Array.isArray(data) ? data.length : 0;
              let errors = 0, warnings = 0;
              for (const f of (Array.isArray(data) ? data : [])) {
                errors += (f.errorCount || 0);
                warnings += (f.warningCount || 0);
              }
              console.log(`| ${t.name} | ${files} | ${errors} | ${warnings} |`);
            } catch (err) {
              console.log(`| ${t.name} | _parse error_ | n/a | n/a |`);
              console.log('');
              console.log('> ' + err.message);
            }
          }
          console.log('');
          console.log('> Advisory only. Typecheck and unit tests remain the authoritative gates.');
          console.log('> Tracked under KI-P14-001 (bootstrap) and the follow-on baseline-triage KI.');
          NODE

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: .lint-reports
          if-no-files-found: warn

  quality-gate:
    name: Quality gate
    # Aggregator for branch protection. Lists every job that must be
    # green for a PR to merge into main, so the branch-protection rule
    # only has to require a single status check (`Quality gate`)
    # instead of having to enumerate each downstream job. Advisory
    # jobs are deliberately excluded:
    #   - lint-advisory  → KI-P14-001 / KI-P15-002 (bootstrap, not yet
    #     triaged); ratchet to blocking is sequenced separately.
    #   - security-audit → KI-P15-001 (baseline triage pending); runs
    #     in `.github/workflows/security-audit.yml`.
    #   - codeql         → advisory by Phase 15A policy.
    # Adding any of those here would silently weaken the PR gate the
    # day the next dependabot bump or upstream rule change introduces
    # a finding the project hasn't yet decided how to handle, so they
    # stay out until each KI is closed.
    needs: [docs-truth, server-quality, client-quality]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify required jobs succeeded
        env:
          DOCS_RESULT: ${{ needs.docs-truth.result }}
          SERVER_RESULT: ${{ needs.server-quality.result }}
          CLIENT_RESULT: ${{ needs.client-quality.result }}
        run: |
          set -u
          fail=0
          check() {
            local name="$1"
            local result="$2"
            if [ "$result" = "success" ]; then
              echo "::notice::$name: $result"
            else
              echo "::error::$name failed with result '$result'"
              fail=1
            fi
          }
          check "docs-truth"     "$DOCS_RESULT"
          check "server-quality" "$SERVER_RESULT"
          check "client-quality" "$CLIENT_RESULT"
          if [ "$fail" -ne 0 ]; then
            {
              echo '## Quality gate'
              echo ''
              echo '| Job | Result |'
              echo '| --- | --- |'
              echo "| docs-truth | $DOCS_RESULT |"
              echo "| server-quality | $SERVER_RESULT |"
              echo "| client-quality | $CLIENT_RESULT |"
              echo ''
              echo '> One or more required jobs did not succeed. Fix the failures above before merging.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          {
            echo '## Quality gate'
            echo ''
            echo 'All required jobs passed: docs-truth, server-quality, client-quality.'
            echo ''
            echo '> Advisory jobs (lint, security audit, CodeQL) are reported separately and do not gate this check.'
          } >> "$GITHUB_STEP_SUMMARY"

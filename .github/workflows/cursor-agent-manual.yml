name: Cursor Agent (Manual Dispatch)

# Manually invoke a Cursor Background Agent on this repo via the API.

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task for the agent (natural language)'
        required: true
        type: string
      base_ref:
        description: 'Base branch to work from'
        required: false
        default: 'main'
        type: string
      model:
        description: 'Model'
        required: false
        default: 'gpt-5.5'
        type: choice
        options:
          - gpt-5.5
          - claude-4.6-sonnet
          - claude-4.7-opus
          - composer-2
          - gemini-3.1-pro
          - gpt-5.3-codex
      open_pr:
        description: 'Open a PR when done'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  invoke:
    runs-on: ubuntu-latest
    steps:
      - name: Verify CURSOR_API_KEY
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "::error::CURSOR_API_KEY missing. Get one at cursor.com/dashboard → Integrations → API Keys."
            exit 1
          fi

      - name: Cost warning
        if: inputs.model == 'claude-4.7-opus'
        run: |
          echo "::warning::Claude 4.7 Opus is the most expensive model. Use sparingly — your Pro+ pool is shared."

      - name: Launch agent
        id: launch
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          BRANCH="cursor/manual-${{ github.run_id }}"
          PAYLOAD=$(jq -n \
            --arg prompt "${{ inputs.task }}" \
            --arg repo "https://github.com/${{ github.repository }}" \
            --arg ref "${{ inputs.base_ref }}" \
            --arg model "${{ inputs.model }}" \
            --argjson autoPr ${{ inputs.open_pr }} \
            --arg branch "$BRANCH" \
            '{
              prompt: { text: $prompt },
              source: { repository: $repo, ref: $ref },
              model: $model,
              target: { autoCreatePr: $autoPr, branchName: $branch }
            }')

          echo "::group::Payload"
          echo "$PAYLOAD" | jq .
          echo "::endgroup::"

          RESPONSE=$(curl -sS -X POST https://api.cursor.com/v0/agents \
            -H "Authorization: Bearer $CURSOR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "::group::Response"
          echo "$RESPONSE" | jq .
          echo "::endgroup::"

          ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          URL=$(echo "$RESPONSE" | jq -r '.target.url // empty')

          if [ -z "$ID" ]; then
            echo "::error::Agent did not launch. Response: $RESPONSE"
            exit 1
          fi

          echo "::notice::Agent launched: $ID — $URL"
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "## Cursor Agent dispatched" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **ID:** \`${{ steps.launch.outputs.id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Model:** \`${{ inputs.model }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Track:** ${{ steps.launch.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"

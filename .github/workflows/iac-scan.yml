name: IaC scan (Checkov)

# Phase 0 batch 0M — supply-chain hardening (closes deep-review P1
# #10–11). Runs Checkov against Docker, nginx, and docker-compose
# manifests to catch IaC misconfigurations before merge.
#
# The scan is ADVISORY through Phase 0 (continue-on-error: true) so
# the operator can see the baseline without it blocking the spine-
# import work. It ratchets to BLOCKING in Phase 12 (pilot readiness),
# alongside the cosign + DR + DPIA hardening.

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  checkov:
    name: Checkov — Docker + nginx + compose
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12.3102.0
        with:
          # Scan Dockerfiles, docker-compose, nginx confs, and any
          # kubernetes manifests that arrive in later phases.
          #
          # Note: Checkov has no `docker_compose` framework — compose
          # files are policy-checked via the generic `yaml` framework
          # (which carries the dedicated CKV_DOCKER_* compose rules).
          # The previous `dockerfile,docker_compose,kubernetes` value
          # was rejected as an invalid framework, which is what made
          # the IaC scan job fail on every PR with no Dockerfile
          # findings actually surfaced.
          framework: dockerfile,kubernetes,yaml
          # Conventional Checkov skip-rules are tracked in
          # docs/operations/checkov-allowlist.md (created when the
          # first skip is genuinely needed). Today: zero skips.
          skip_check: ''
          quiet: false
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: true

      - name: Upload SARIF to GitHub code-scanning
        if: always() && hashFiles('checkov.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov.sarif
          category: checkov
